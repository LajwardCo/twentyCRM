name: Deploy CRM (hamagan-management)

# Build the fork image ON THE RUNNER (ample RAM/CPU + working DNS), push to
# GHCR, then SSH to the hamagan-management box which only pulls + runs it.
# The box is too small to build Twenty's frontend (8G heap -> swap thrash), so
# all heavy work happens here in CI.
on:
  push:
    branches: [main]
    paths:
      - 'packages/twenty-server/**'
      - 'packages/twenty-front/**'
      - 'packages/twenty-ui/**'
      - 'packages/twenty-shared/**'
      - 'packages/twenty-emails/**'
      - 'packages/twenty-sdk/**'
      - 'packages/twenty-client-sdk/**'
      - 'packages/twenty-front-component-renderer/**'
      - 'packages/twenty-docker/**'
      - '.github/workflows/deploy-hamagan-crm.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-hamagan-crm
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/lajwardco/twenty-crm

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HAMAGAN_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HAMAGAN_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose assets to box
        run: |
          rsync -az \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" \
            packages/twenty-docker/ \
            "${{ secrets.HAMAGAN_USER }}@${{ secrets.HAMAGAN_HOST }}:/opt/twenty/packages/twenty-docker/"

      - name: Deploy on box (pull + up)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "${{ secrets.HAMAGAN_USER }}@${{ secrets.HAMAGAN_HOST }}" \
            "IMAGE='${{ env.IMAGE }}:${{ github.sha }}' \
             REG_USER='${{ github.actor }}' \
             REG_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
             bash /opt/twenty/packages/twenty-docker/deploy-hamagan.sh"
